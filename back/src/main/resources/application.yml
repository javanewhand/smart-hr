server:
  port: 8080

spring:
  application:
    name: smart-hr
  profiles:
    active: dev
  config:
    import: optional:classpath:application-private.yml

  # 数据源配置
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${DB_NAME:smarthr}
    username: ${DB_USER:smarthr}
    password: ${DB_PASSWORD:smarthr123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # Neo4j 配置（使用 Spring Boot 官方前缀）
  neo4j:
    uri: bolt://${NEO4J_HOST:localhost}:${NEO4J_PORT:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:neo4j123}

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ==================== Spring AI Alibaba 配置 ====================
  ai:
    dashscope:
      # 配置为dashscope的api-key
      api-key: ${DASHSCOPE_API_KEY:}
      chat:
        options:
          model: qwen-plus
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-v2
    openai:
      # 配置为你的 OpenAI Key
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com/
      chat:
        options:
          model: gpt-4o
      embedding:
        options:
          model: text-embedding-3-small

    # PgVector 向量存储配置 暂时没用
    vectorstore:
      pgvector:
        enabled: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: true

# ==================== Smart-HR 自定义配置 ====================
smart-hr:
  jwt:
    # Base64 编码的 256 位密钥（开发环境默认值，生产环境请更换）
    secret: ${JWT_SECRET:c21hcnQtaHItand0LXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LW9ubHktcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9u}
    expiration: 86400000 # 24 hours in milliseconds
    refresh-expiration: 604800000 # 7 days in milliseconds

  ai:
    # 默认使用阿里云百炼
    default-model: aliyun
    aliyun:
      enabled: true
    openai:
      enabled: true

  # Milvus 向量存储配置（简历向量存储）
  milvus:
    enabled: true
    host: ${MILVUS_HOST:localhost}
    port: ${MILVUS_PORT:19530}
    database-name: default
    collection-name: smart_hr_resumes
    question-collection-name: smart_hr_questions
    embedding-dimension: 1536
    index-type: IVF_FLAT
    metric-type: COSINE
    nlist: 1024
    nprobe: 16

  # MinIO 对象存储配置
  minio:
    enabled: true
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:smarthr-resumes}
    connect-timeout: 10
    write-timeout: 60
    read-timeout: 10

  # 文件存储路径
  storage:
    path: ${STORAGE_PATH:./uploads}

# ==================== Springdoc OpenAPI 配置 ====================
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.smarthr.controller

# ==================== 日志配置 ====================
logging:
  level:
    root: INFO
    com.smarthr: DEBUG
    org.springframework.ai: DEBUG
    com.alibaba.cloud.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
